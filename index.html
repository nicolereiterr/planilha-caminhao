<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Planilha do Caminhão</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #232735;
    --border: #2e3345;
    --text: #e8eaf0;
    --text2: #8b90a5;
    --accent: #4a9eff;
    --accent2: #3a7fd4;
    --green: #34d399;
    --green-bg: rgba(52,211,153,0.1);
    --red: #f87171;
    --red-bg: rgba(248,113,113,0.1);
    --yellow: #fbbf24;
    --yellow-bg: rgba(251,191,36,0.1);
    --radius: 14px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding-bottom: 100px;
    overflow-x: hidden;
  }

  .header {
    background: linear-gradient(135deg, #1e2a4a 0%, #162035 100%);
    padding: 20px 16px 16px;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .header h1 {
    font-size: 18px;
    font-weight: 700;
    letter-spacing: -0.3px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .header h1 span { font-size: 20px; }

  .header-sub {
    font-size: 12px;
    color: var(--text2);
    margin-top: 4px;
    font-family: 'JetBrains Mono', monospace;
  }

  .tabs {
    display: flex;
    gap: 4px;
    padding: 12px 16px;
    background: var(--bg);
    position: sticky;
    top: 72px;
    z-index: 99;
    border-bottom: 1px solid var(--border);
  }

  .tab {
    flex: 1;
    padding: 10px 8px;
    border: none;
    background: var(--surface);
    color: var(--text2);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 600;
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .tab.active {
    background: var(--accent);
    color: white;
    box-shadow: 0 2px 12px rgba(74,158,255,0.3);
  }

  .content { padding: 16px; }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 12px;
  }

  .card-title {
    font-size: 12px;
    font-weight: 600;
    color: var(--text2);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-bottom: 12px;
  }

  .form-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 10px;
  }

  .form-row.full { grid-template-columns: 1fr; }

  .form-group { display: flex; flex-direction: column; gap: 4px; }

  .form-group label {
    font-size: 11px;
    font-weight: 600;
    color: var(--text2);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .form-group input, .form-group select {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px;
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 15px;
    font-weight: 500;
    outline: none;
    transition: border-color 0.2s;
    width: 100%;
  }

  .form-group input:focus, .form-group select:focus {
    border-color: var(--accent);
  }

  .form-group input::placeholder { color: var(--text2); opacity: 0.5; }

  .btn {
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 12px;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .btn-primary {
    background: var(--accent);
    color: white;
    box-shadow: 0 2px 12px rgba(74,158,255,0.25);
  }

  .btn-primary:active { transform: scale(0.97); }

  .btn-danger {
    background: var(--red-bg);
    color: var(--red);
    border: 1px solid rgba(248,113,113,0.2);
  }

  .btn-success {
    background: var(--green-bg);
    color: var(--green);
    border: 1px solid rgba(52,211,153,0.2);
  }

  .btn-secondary {
    background: var(--surface2);
    color: var(--text);
    border: 1px solid var(--border);
  }

  .btn-small {
    padding: 8px 12px;
    font-size: 12px;
    width: auto;
    border-radius: 8px;
  }

  /* Records list */
  .record {
    background: var(--surface2);
    border-radius: 12px;
    padding: 14px;
    margin-bottom: 8px;
    border: 1px solid var(--border);
    position: relative;
  }

  .record-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
  }

  .record-date {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    font-weight: 600;
    color: var(--accent);
  }

  .record-total {
    font-family: 'JetBrains Mono', monospace;
    font-size: 16px;
    font-weight: 700;
    color: var(--green);
  }

  .record-details {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 6px;
  }

  .record-detail {
    font-size: 11px;
    color: var(--text2);
  }

  .record-detail strong {
    display: block;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    color: var(--text);
    font-weight: 600;
  }

  .record-fuel {
    margin-top: 8px;
    padding-top: 8px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 16px;
  }

  .record-fuel .record-detail { font-size: 10px; }

  .record-actions {
    display: flex;
    gap: 6px;
    margin-top: 8px;
    padding-top: 8px;
    border-top: 1px solid var(--border);
  }

  /* Summary */
  .summary-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  .summary-item {
    background: var(--surface2);
    border-radius: 12px;
    padding: 14px;
    border: 1px solid var(--border);
  }

  .summary-item.highlight {
    grid-column: span 2;
    background: linear-gradient(135deg, rgba(74,158,255,0.1) 0%, rgba(52,211,153,0.1) 100%);
    border-color: rgba(74,158,255,0.2);
  }

  .summary-label {
    font-size: 11px;
    font-weight: 600;
    color: var(--text2);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .summary-value {
    font-family: 'JetBrains Mono', monospace;
    font-size: 22px;
    font-weight: 700;
    margin-top: 4px;
  }

  .summary-value.green { color: var(--green); }
  .summary-value.red { color: var(--red); }
  .summary-value.blue { color: var(--accent); }
  .summary-value.yellow { color: var(--yellow); }

  /* Settings */
  .settings-note {
    font-size: 12px;
    color: var(--text2);
    margin-bottom: 16px;
    line-height: 1.5;
  }

  /* Config bar */
  .config-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 16px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    font-size: 12px;
    color: var(--text2);
  }

  .config-bar select {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 6px 10px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 600;
  }

  .empty-state {
    text-align: center;
    padding: 40px 20px;
    color: var(--text2);
  }

  .empty-state .icon { font-size: 48px; margin-bottom: 12px; }
  .empty-state p { font-size: 14px; line-height: 1.6; }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: var(--green);
    color: #0f1117;
    padding: 12px 24px;
    border-radius: 12px;
    font-weight: 700;
    font-size: 14px;
    z-index: 200;
    transition: transform 0.3s;
    white-space: nowrap;
  }

  .toast.show { transform: translateX(-50%) translateY(0); }

  /* Quinzena selector */
  .quinzena-bar {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .quinzena-bar select {
    flex: 1;
  }

  .btn-new-q {
    padding: 6px 12px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-weight: 700;
    font-size: 12px;
    cursor: pointer;
    white-space: nowrap;
  }

  @media print {
    body { background: white; color: black; padding: 20px; }
    .header, .tabs, .config-bar, .btn, .record-actions, .toast { display: none; }
    .card { border: 1px solid #ccc; break-inside: avoid; }
    .summary-item { border: 1px solid #ccc; }
    .record { border: 1px solid #ccc; }
    .content { padding: 0; }
  }
</style>
</head>
<body>

<div class="header">
  <h1><span>🚛</span> Planilha do Caminhão</h1>
  <div class="header-sub" id="headerPlate">ABC1D23 — MOTORISTA</div>
</div>

<div class="config-bar">
  <div class="quinzena-bar" style="width:100%">
    <span>Quinzena:</span>
    <select id="quinzenaSelect" onchange="switchQuinzena()"></select>
    <button class="btn-new-q" onclick="showNewQForm()">+ Nova</button>
  </div>
</div>

<div id="newQForm" style="display:none;padding:12px 16px;background:var(--surface);border-bottom:1px solid var(--border);">
  <div style="font-size:13px;font-weight:600;color:var(--text);margin-bottom:8px;">Nova quinzena</div>
  <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
    <select id="newQHalf" style="background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:8px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;">
      <option value="1">1ª Quinzena (01-15)</option>
      <option value="2">2ª Quinzena (16-fim)</option>
    </select>
    <select id="newQMonth" style="background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:8px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;">
      <option value="0">Janeiro</option><option value="1">Fevereiro</option>
      <option value="2">Março</option><option value="3">Abril</option>
      <option value="4">Maio</option><option value="5">Junho</option>
      <option value="6">Julho</option><option value="7">Agosto</option>
      <option value="8">Setembro</option><option value="9">Outubro</option>
      <option value="10">Novembro</option><option value="11">Dezembro</option>
    </select>
    <select id="newQYear" style="background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:8px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;">
      <option value="2025">2025</option><option value="2026" selected>2026</option>
      <option value="2027">2027</option><option value="2028">2028</option>
    </select>
  </div>
  <div style="display:flex;gap:8px;margin-top:8px;">
    <button class="btn btn-primary btn-small" onclick="createCustomQ()">Criar</button>
    <button class="btn btn-secondary btn-small" onclick="hideNewQForm()">Cancelar</button>
  </div>
</div>

<div class="tabs">
  <button class="tab active" onclick="showTab('registrar')">Registrar</button>
  <button class="tab" onclick="showTab('registros')">Registros</button>
  <button class="tab" onclick="showTab('resumo')">Resumo</button>
  <button class="tab" onclick="showTab('config')">Config</button>
</div>

<div class="content" id="content"></div>
<div class="toast" id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/10.12.2/firebase-app-compat.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/10.12.2/firebase-firestore-compat.min.js"></script>
<script>
// ── Firebase ──
firebase.initializeApp({
  apiKey: "AIzaSyCWJuFq_weNp3HWzDOhwQLrQHRwe1mK5TI",
  authDomain: "planilha-caminhao.firebaseapp.com",
  projectId: "planilha-caminhao",
  storageBucket: "planilha-caminhao.firebasestorage.app",
  messagingSenderId: "269215537987",
  appId: "1:269215537987:web:4641aac66eb80d1de7edf6"
});
const db = firebase.firestore();

// ── Access Code System ──
// Triple redundancy: localStorage + cookie + IndexedDB
// If ANY of the three survives browser cleanup, the code persists

function setCookie(name, value, days) {
  const d = new Date();
  d.setTime(d.getTime() + (days * 24 * 60 * 60 * 1000));
  document.cookie = name + '=' + encodeURIComponent(value) + ';expires=' + d.toUTCString() + ';path=/;SameSite=Lax';
}

function getCookie(name) {
  const v = document.cookie.match('(^|;)\\s*' + name + '\\s*=\\s*([^;]+)');
  return v ? decodeURIComponent(v.pop()) : null;
}

function setIDB(key, value) {
  try {
    const req = indexedDB.open('caminhao_db', 1);
    req.onupgradeneeded = (e) => { e.target.result.createObjectStore('config'); };
    req.onsuccess = (e) => {
      const db2 = e.target.result;
      const tx = db2.transaction('config', 'readwrite');
      tx.objectStore('config').put(value, key);
    };
  } catch(e) {}
}

function getIDB(key) {
  return new Promise((resolve) => {
    try {
      const req = indexedDB.open('caminhao_db', 1);
      req.onupgradeneeded = (e) => { e.target.result.createObjectStore('config'); };
      req.onsuccess = (e) => {
        const db2 = e.target.result;
        const tx = db2.transaction('config', 'readonly');
        const get = tx.objectStore('config').get(key);
        get.onsuccess = () => resolve(get.result || null);
        get.onerror = () => resolve(null);
      };
      req.onerror = () => resolve(null);
    } catch(e) { resolve(null); }
  });
}

function saveCodeEverywhere(code) {
  localStorage.setItem('caminhao_access_code', code);
  setCookie('caminhao_access_code', code, 3650); // 10 years
  setIDB('access_code', code);
}

async function getAccessCodeAsync() {
  // Try localStorage first (fastest)
  let code = localStorage.getItem('caminhao_access_code');
  
  // Try cookie
  if (!code) {
    code = getCookie('caminhao_access_code');
    if (code) localStorage.setItem('caminhao_access_code', code);
  }
  
  // Try IndexedDB
  if (!code) {
    code = await getIDB('access_code');
    if (code) localStorage.setItem('caminhao_access_code', code);
  }
  
  // If found in any source, re-save everywhere for redundancy
  if (code) {
    saveCodeEverywhere(code);
    return code;
  }
  
  // Nothing found anywhere — ask user
  while (true) {
    code = prompt('Crie um codigo de acesso para seus dados.\nUse algo facil de lembrar (ex: sua placa, seu nome, etc).\n\nSe ja tem um codigo, digite ele aqui para recuperar seus dados:');
    if (code && code.trim().length >= 3) {
      code = code.trim().toLowerCase().replace(/[^a-z0-9]/g, '');
      if (code.length >= 3) {
        saveCodeEverywhere(code);
        return code;
      }
    }
    alert('O codigo precisa ter pelo menos 3 letras ou numeros.');
  }
}

// ── Boot ──
// Must use async init because IndexedDB is async
let ACCESS_CODE, DEVICE_ID, ENC_KEY;

async function boot() {
  ACCESS_CODE = await getAccessCodeAsync();
  DEVICE_ID = 'user_' + ACCESS_CODE;
  
  // Derive encryption key from access code (deterministic)
  let key = '';
  const base = ACCESS_CODE + '_caminhao_key_2024';
  for (let i = 0; i < 64; i++) {
    key += base.charCodeAt(i % base.length).toString(16).padStart(2, '0');
  }
  ENC_KEY = key.substring(0, 64);
  
  // Load local data first (fast)
  loadData();
  
  // Try to restore from cloud BEFORE creating default quinzena
  await loadFromCloud();
  
  // Only now create default quinzena if still empty
  initQuinzena();
  render();
}

function encrypt(text) {
  const key = ENC_KEY;
  let result = '';
  for (let i = 0; i < text.length; i++) {
    const charCode = text.charCodeAt(i) ^ key.charCodeAt(i % key.length);
    result += String.fromCharCode(charCode);
  }
  return btoa(unescape(encodeURIComponent(result)));
}

function decrypt(encoded) {
  try {
    const key = ENC_KEY;
    const text = decodeURIComponent(escape(atob(encoded)));
    let result = '';
    for (let i = 0; i < text.length; i++) {
      const charCode = text.charCodeAt(i) ^ key.charCodeAt(i % key.length);
      result += String.fromCharCode(charCode);
    }
    return result;
  } catch(e) { return null; }
}

// ── State ──
let currentTab = 'registrar';
let data = {
  config: { placa: 'ABC1D23', motorista: 'MOTORISTA', kmBase: 100, valorKm: 2, diariaDefault: 460, adiantamento: 0 },
  quinzenas: [],
  currentQ: null
};

function loadData() {
  const saved = localStorage.getItem('caminhao_data');
  if (saved && saved !== 'null') {
    try { data = JSON.parse(saved); } catch(e) {}
  }
}

// Try loading from IndexedDB if localStorage was empty
async function loadDataFromIDB() {
  if (localStorage.getItem('caminhao_data') && localStorage.getItem('caminhao_data') !== 'null') return;
  const idbData = await getIDB('caminhao_data');
  if (idbData) {
    try {
      data = JSON.parse(idbData);
      localStorage.setItem('caminhao_data', JSON.stringify(data));
      render();
    } catch(e) {}
  }
}

function save() {
  localStorage.setItem('caminhao_data', JSON.stringify(data));
  setIDB('caminhao_data', JSON.stringify(data));
  saveToCloud();
  checkAutoBackup();
}

let cloudSaveTimeout = null;
function saveToCloud() {
  if (cloudSaveTimeout) clearTimeout(cloudSaveTimeout);
  cloudSaveTimeout = setTimeout(async () => {
    try {
      const encrypted = encrypt(JSON.stringify(data));
      await db.collection('caminhoes').doc(DEVICE_ID).set({
        data: encrypted,
        encrypted: true,
        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
      });
      console.log('Cloud save OK - ID:', DEVICE_ID);
    } catch(err) { console.log('Cloud save failed:', err); }
  }, 1500);
}

// Load from cloud — always tries to sync, merges intelligently
async function loadFromCloud() {
  // First try IDB recovery
  await loadDataFromIDB();
  
  try {
    console.log('Loading from cloud with ID:', DEVICE_ID);
    const doc = await db.collection('caminhoes').doc(DEVICE_ID).get();
    
    if (doc.exists) {
      console.log('Document found in Firebase');
      
      let cloudData;
      if (doc.data().encrypted) {
        const decrypted = decrypt(doc.data().data);
        if (!decrypted) {
          console.log('Decryption failed');
          toast('Erro ao descriptografar. Codigo de acesso pode estar errado.');
          return;
        }
        cloudData = JSON.parse(decrypted);
      } else {
        cloudData = JSON.parse(doc.data().data);
      }
      
      // Count real records in each source
      const localRecords = data.quinzenas ? data.quinzenas.reduce((s, q) => s + (q.records ? q.records.length : 0) + (q.abastecimentos ? q.abastecimentos.length : 0), 0) : 0;
      const cloudRecords = cloudData.quinzenas ? cloudData.quinzenas.reduce((s, q) => s + (q.records ? q.records.length : 0) + (q.abastecimentos ? q.abastecimentos.length : 0), 0) : 0;
      
      console.log('Local records:', localRecords, 'Cloud records:', cloudRecords);
      
      if (localRecords === 0 && cloudRecords > 0) {
        // Local empty, cloud has data — restore from cloud
        data = cloudData;
        localStorage.setItem('caminhao_data', JSON.stringify(data));
        setIDB('caminhao_data', JSON.stringify(data));
        updateQuinzenaSelect();
        render();
        toast('Dados restaurados da nuvem!');
      } else if (localRecords > 0 && cloudRecords > localRecords) {
        // Cloud has more data — cloud wins
        data = cloudData;
        localStorage.setItem('caminhao_data', JSON.stringify(data));
        setIDB('caminhao_data', JSON.stringify(data));
        updateQuinzenaSelect();
        render();
        toast('Dados atualizados da nuvem!');
      } else if (localRecords > 0 && localRecords >= cloudRecords) {
        // Local has same or more data — save local to cloud
        console.log('Local data is up to date, syncing to cloud');
        saveToCloud();
      }
    } else {
      console.log('No document found for ID:', DEVICE_ID);
      // If we have local data, save it to cloud
      const localRecords = data.quinzenas ? data.quinzenas.reduce((s, q) => s + (q.records ? q.records.length : 0), 0) : 0;
      if (localRecords > 0) {
        saveToCloud();
        toast('Dados enviados para a nuvem!');
      }
    }
  } catch(e) { console.log('Cloud load failed:', e); }
}
// loadFromCloud is called by boot()

function checkAutoBackup() {
  if (data.config.autoBackup !== true) return;
  
  const lastBackup = localStorage.getItem('caminhao_last_backup');
  const now = Date.now();
  const threeDays = 3 * 24 * 60 * 60 * 1000;
  
  // Only check once per session
  if (window._backupChecked) return;
  window._backupChecked = true;
  
  if (!lastBackup || (now - parseInt(lastBackup)) > threeDays) {
    const q = getQ();
    if (q && q.records.length > 0) {
      setTimeout(() => {
        if (confirm('Faz 3 dias que você não fez backup. Enviar backup pelo WhatsApp agora?')) {
          sendBackupWhatsApp();
        }
      }, 500);
    }
  }
}

function toggleAutoBackup() {
  data.config.autoBackup = document.getElementById('cfgAutoBackup').checked;
  save();
  toast(data.config.autoBackup ? 'Lembrete automático ativado!' : 'Lembrete automático desativado');
  render();
}

function sendBackupWhatsApp() {
  const q = getQ();
  const backupData = JSON.stringify(data);
  const resumo = q ? generateBackupText(q) : 'Sem dados na quinzena atual.';
  
  const text = `🚛 BACKUP PLANILHA CAMINHÃO\n📅 ${new Date().toLocaleDateString('pt-BR')} às ${new Date().toLocaleTimeString('pt-BR', {hour:'2-digit',minute:'2-digit'})}\n\n${resumo}\n\n📦 Dados completos (copie tudo abaixo pra restaurar):\n${backupData}`;
  
  const url = `https://wa.me/?text=${encodeURIComponent(text)}`;
  window.open(url, '_blank');
  localStorage.setItem('caminhao_last_backup', Date.now().toString());
  toast('Backup enviado!');
}

function generateBackupText(q) {
  const completos = q.records.filter(r => !r.parcial);
  const totalDiarias = completos.reduce((s, r) => s + r.total, 0);
  const totalDiesel = q.abastecimentos.reduce((s, a) => s + a.valorTotal, 0);
  const adiantamento = data.config.adiantamento || 0;
  const valorLiquido = totalDiarias - totalDiesel - adiantamento;
  
  return `📋 ${q.label}\n` +
    `Registros: ${completos.length} completos\n` +
    `Total diárias: R$ ${totalDiarias.toFixed(2)}\n` +
    `Total diesel: R$ ${totalDiesel.toFixed(2)}\n` +
    `Valor líquido: R$ ${valorLiquido.toFixed(2)}`;
}

function restoreBackup() {
  const input = prompt('Cole aqui os dados do backup (aquele textão que começa com {):');
  if (!input) return;
  try {
    const restored = JSON.parse(input.trim());
    if (restored.config && restored.quinzenas) {
      data = restored;
      save();
      updateQuinzenaSelect();
      render();
      toast('Backup restaurado!');
    } else {
      toast('Dados inválidos!');
    }
  } catch(e) {
    toast('Erro ao restaurar. Verifique se copiou tudo.');
  }
}

function getQ() {
  if (data.currentQ === null || !data.quinzenas[data.currentQ]) return null;
  return data.quinzenas[data.currentQ];
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;

function createCustomQ() {

  const month = parseInt(document.getElementById('newQMonth').value);
  const year = parseInt(document.getElementById('newQYear').value);
  const monthNames = ['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];
  const monthName = monthNames[month];
  
  let label;
  if (half === 1) {

    label = `2ª Quinz. ${monthName} ${year} (16-${endDay})`;

  data.quinzenas.push({ label, records: [], abastecimentos: [], month: month, year: year, half: half });
  data.currentQ = data.quinzenas.length - 1;
  save();
  updateQuinzenaSelect();

}

// Loan calculation: parcela 14 vence 15/abr/2026, 15 vence 15/mai/2026, etc.
// ONLY applies to 2nd quinzena (half === 2) of each month
function getParcelaInfo(q) {
  if (!q) return null;
  const half = parseInt(q.half);
  if (half !== 2) return null;
  
  // Parcela 14 = april 2026 (month 3), parcela 15 = may 2026, etc.
  const baseMonth = 3; // April = month index 3
  const baseYear = 2026;
  const baseParcela = 14;
  
  const monthsDiff = (q.year - baseYear) * 12 + (q.month - baseMonth);
  const parcelaNum = baseParcela + monthsDiff;
  
  if (parcelaNum < 1 || parcelaNum > 24) return null;
  return { numero: parcelaNum, valor: 1306.10, total: 24 };
}

// ── Init Quinzena ──
function initQuinzena() {
  if (data.quinzenas.length === 0) {
    const now = new Date();
    const half = now.getDate() <= 15 ? 1 : 2;
    const month = now.getMonth();
    const year = now.getFullYear();
    const monthNames = ['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];
    const endDay = new Date(year, month + 1, 0).getDate();
    const label = half === 1 ? `1ª Quinz. ${monthNames[month]} ${year} (01-15)` : `2ª Quinz. ${monthNames[month]} ${year} (16-${endDay})`;
    data.quinzenas.push({ label, records: [], abastecimentos: [], month, year, half });

}

function addRecord() {
  const q = getQ();
  if (!q) return;
  
  const dateVal = document.getElementById('regData').value;
  const kmI = parseFloat(document.getElementById('regKmI').value);
  const kmF = document.getElementById('regKmF').value ? parseFloat(document.getElementById('regKmF').value) : null;
  const diaria = parseFloat(document.getElementById('regDiaria').value);

  if (!dateVal || isNaN(kmI)) {
    toast('Preencha pelo menos a data e o KM inicial!');
    return;
  }

  if (kmF !== null) {
    const kmRodado = kmF - kmI;
    const kmAdicional = Math.max(0, kmRodado - data.config.kmBase);
    const valorAdicional = kmAdicional * data.config.valorKm;
    const total = diaria + valorAdicional;
    q.records.push({ date: dateVal, kmInicial: kmI, kmFinal: kmF, diaria, kmAdicional, valorAdicional, total, parcial: false });
  } else {
    q.records.push({ date: dateVal, kmInicial: kmI, kmFinal: null, diaria, kmAdicional: 0, valorAdicional: 0, total: 0, parcial: true });
  }
  save();
  toast(kmF !== null ? 'Registro salvo!' : 'Registro parcial salvo! Complete o KM final depois.');
  render();
}

function addFuel() {
  const q = getQ();
  if (!q) return;

  const dateVal = document.getElementById('fuelData').value;
  const preco = parseFloat(document.getElementById('fuelPreco').value);
  const total = parseFloat(document.getElementById('fuelTotal').value);

  if (!dateVal || isNaN(preco) || isNaN(total)) {
    toast('Preencha todos os campos!');

  }

  const litros = total / preco;
  q.abastecimentos.push({ date: dateVal, precoLitro: preco, valorTotal: total, litros });
  save();
  toast('Abastecimento salvo!');
  render();
}

  r.kmFinal = kmFinal;

  r.kmAdicional = Math.max(0, kmRodado - data.config.kmBase);
  r.valorAdicional = r.kmAdicional * data.config.valorKm;
  r.total = r.diaria + r.valorAdicional;
  r.parcial = false;

// FIFO km/litro: first fuel in = first fuel consumed
function calcFIFOKmL(q) {
  if (!q || q.abastecimentos.length === 0 || q.records.filter(r => !r.parcial).length === 0) return null;
  
  const completos = q.records.filter(r => !r.parcial).sort((a,b) => a.date.localeCompare(b.date));
  const abasts = q.abastecimentos.sort((a,b) => a.date.localeCompare(b.date));
  
  // Build fuel queue (FIFO)
  let fuelQueue = [];
  abasts.forEach(a => fuelQueue.push({ litros: a.litros, precoLitro: a.precoLitro }));
  
  let totalKm = 0;
  let totalLitrosUsados = 0;
  
  completos.forEach(r => {
    const kmRodado = r.kmFinal - r.kmInicial;
    totalKm += kmRodado;
  });
  
  // Consume fuel FIFO
  let kmRemaining = totalKm;
  let litrosConsumidos = 0;
  const estimatedKmPerLiter = 2.5; // rough estimate to convert km to liters needed
  let litrosNeeded = totalKm / estimatedKmPerLiter;
  
  // Simpler approach: total km / total liters from FIFO order
  let totalFifoLitros = 0;
  for (let i = 0; i < fuelQueue.length && totalFifoLitros < litrosNeeded * 1.5; i++) {
    totalFifoLitros += fuelQueue[i].litros;
  }
  
  if (totalFifoLitros === 0) return null;
  return totalKm / totalFifoLitros;
}

// ── PDF Generation ──
function gerarPDF(qIndex) {
  const qi = qIndex !== undefined ? qIndex : data.currentQ;
  const q = data.quinzenas[qi];
  if (!q) return;

  const completos = q.records.filter(r => !r.parcial);
  const totalDiarias = completos.reduce((s, r) => s + r.total, 0);
  const totalDiesel = q.abastecimentos.reduce((s, a) => s + a.valorTotal, 0);
  const adiantamento = data.config.adiantamento || 0;
  const parcela = getParcelaInfo(q);
  const parcelaValor = parcela ? parcela.valor : 0;
  const valorLiquido = totalDiarias - totalDiesel - adiantamento - parcelaValor;
  const totalRodado = completos.reduce((s, r) => s + (r.kmFinal - r.kmInicial), 0);
  const mediaKmAdicional = completos.length > 0 ? completos.reduce((s, r) => s + r.kmAdicional, 0) / completos.length : 0;
  const mediaDiaria = completos.length > 0 ? totalDiarias / completos.length : 0;
  const totalLitros = q.abastecimentos.reduce((s, a) => s + a.litros, 0);
  const mediaKmLitro = totalLitros > 0 ? totalRodado / totalLitros : 0;
  const fifoKmL = calcFIFOKmL(q);

  let tableRows = completos.map(r => {
    const d = new Date(r.date + 'T12:00:00');
    const dateStr = d.toLocaleDateString('pt-BR');
    return `<tr>
      <td>${dateStr}</td>
      <td>${r.kmInicial.toFixed(0)}</td>
      <td>${r.kmFinal.toFixed(0)}</td>
      <td>R$ ${r.diaria.toFixed(0)}</td>
      <td>${r.kmAdicional}</td>
      <td>R$ ${r.valorAdicional.toFixed(0)}</td>
      <td><strong>R$ ${r.total.toFixed(0)}</strong></td>
    </tr>`;
  }).join('');

  let fuelRows = q.abastecimentos.map(a => {
    const d = new Date(a.date + 'T12:00:00');
    const dateStr = d.toLocaleDateString('pt-BR');
    return `<tr>
      <td>${dateStr}</td>
      <td>R$ ${a.precoLitro.toFixed(2)}</td>
      <td>${a.litros.toFixed(1)}L</td>
      <td>R$ ${a.valorTotal.toFixed(2)}</td>
    </tr>`;
  }).join('');

  const html = `<!DOCTYPE html><html><head><meta charset="UTF-8">
    <title>Planilha ${q.label}</title>
    <style>
      body { font-family: Arial, sans-serif; padding: 24px; color: #1a1a1a; font-size: 12px; }
      h1 { font-size: 18px; margin-bottom: 4px; }
      h2 { font-size: 14px; margin: 20px 0 8px; color: #444; border-bottom: 2px solid #333; padding-bottom: 4px; }
      .sub { color: #666; font-size: 13px; margin-bottom: 20px; }
      table { width: 100%; border-collapse: collapse; margin-bottom: 16px; }
      th, td { border: 1px solid #ccc; padding: 6px 8px; text-align: center; }
      th { background: #2f5233; color: white; font-size: 11px; }
      td { font-size: 11px; }
      .summary { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 16px; }
      .summary-box { border: 1px solid #ccc; border-radius: 6px; padding: 10px 14px; min-width: 140px; }
      .summary-box .label { font-size: 10px; color: #666; text-transform: uppercase; }
      .summary-box .value { font-size: 18px; font-weight: 700; margin-top: 2px; }
      .highlight-box { background: #e8f5e9; border-color: #4caf50; }
      .highlight-box .value { color: #2e7d32; }
      .warn-box { background: #fff3e0; border-color: #ff9800; }
      .warn-box .value { color: #e65100; }
    </style>
  </head><body>
    <h1>🚛 PLANILHA CAMINHÃO — ${data.config.motorista}</h1>
    <div class="sub">${q.label} · Placa: ${data.config.placa}</div>

    <h2>Registros de Viagem</h2>
    <table>
      <tr><th>Data</th><th>KM Inicial</th><th>KM Final</th><th>Diária</th><th>KM Adic.</th><th>Valor Adic.</th><th>Total</th></tr>
      ${tableRows}
    </table>

    ${q.abastecimentos.length > 0 ? `
    <h2>Abastecimentos</h2>
    <table>
      <tr><th>Data</th><th>Preço/Litro</th><th>Litros</th><th>Valor Total</th></tr>
      ${fuelRows}
    </table>` : ''}

    <h2>Resumo da Quinzena</h2>
    <div class="summary">
      <div class="summary-box highlight-box"><div class="label">Valor Líquido</div><div class="value">R$ ${valorLiquido.toFixed(2)}</div></div>
      <div class="summary-box"><div class="label">Total Diárias</div><div class="value">R$ ${totalDiarias.toFixed(2)}</div></div>
      <div class="summary-box"><div class="label">Total Diesel</div><div class="value">R$ ${totalDiesel.toFixed(2)}</div></div>
      ${adiantamento > 0 ? `<div class="summary-box"><div class="label">Adiantamento</div><div class="value">R$ ${adiantamento.toFixed(2)}</div></div>` : ''}
      ${parcela ? `<div class="summary-box warn-box"><div class="label">Parcela Caminhão (${parcela.numero}/${parcela.total})</div><div class="value">R$ ${parcela.valor.toFixed(2)}</div></div>` : ''}

      <div class="summary-box"><div class="label">Média Diária</div><div class="value">R$ ${mediaDiaria.toFixed(2)}</div></div>
      ${totalLitros > 0 ? `<div class="summary-box"><div class="label">Média KM/Litro</div><div class="value">${mediaKmLitro.toFixed(2)}</div></div>` : ''}
      ${fifoKmL !== null ? `<div class="summary-box"><div class="label">Média KM/Litro (FIFO)</div><div class="value">${fifoKmL.toFixed(2)}</div></div>` : ''}
    </div>
  </body></html>`;

  const printWindow = window.open('', '_blank');
  printWindow.document.write(html);
  printWindow.document.close();
  setTimeout(() => { printWindow.print(); }, 500);
}

// ── Recovery: search all Firebase documents and crack XOR encryption ──
let _recoveredCache = {}; // Cache decrypted data so we don't lose it

function tryDecrypt(doc) {
  let docData = null;
  let method = '';
  
  // Method 1: Try current key
  try {
    if (doc.data().encrypted) {
      const decrypted = decrypt(doc.data().data);
      if (decrypted) {
        docData = JSON.parse(decrypted);
        method = 'chave atual';
      }
    }
  } catch(e) {}
  
  // Method 2: Try raw JSON (unencrypted)
  if (!docData) {
    try {
      docData = JSON.parse(doc.data().data);
      if (docData && docData.quinzenas) method = 'sem criptografia';
      else docData = null;
    } catch(e) {}
  }
  
  // Method 3 & 4: XOR known-plaintext attack
  if (!docData && doc.data().encrypted && doc.data().data) {
    try {
      const encoded = doc.data().data;
      const ciphertext = decodeURIComponent(escape(atob(encoded)));
      
      const knownStarts = [
        '{"config":{"placa":"CKD2E98","motorista":"VILSON","kmBase":100,"valorKm":2,"diariaDefault":460',
        '{"config":{"placa":"CKD2E98","motorista":"VILSON"',
        '{"config":{"placa":"ABC1D23","motorista":"MOTORISTA","kmBase":100,"valorKm":2,"diariaDefault":460',
        '{"config":{"placa":"ABC1D23","motorista":"MOTORISTA"',
      ];
      
      for (const knownPlain of knownStarts) {
        if (docData) break;
        try {
          let testKey = '';
          for (let i = 0; i < Math.min(knownPlain.length, 128); i++) {
            testKey += String.fromCharCode(ciphertext.charCodeAt(i) ^ knownPlain.charCodeAt(i));
          }
          let decResult = '';
          for (let i = 0; i < ciphertext.length; i++) {
            const charCode = ciphertext.charCodeAt(i) ^ testKey.charCodeAt(i % testKey.length);
            decResult += String.fromCharCode(charCode);
          }
          if (decResult.includes('"quinzenas"') && decResult.includes('"records"')) {
            try {
              const parsed = JSON.parse(decResult);
              if (parsed && parsed.quinzenas) {
                docData = parsed;
                method = 'chave recuperada';
              }
            } catch(e) {}
          }
        } catch(e) { continue; }
      }
      
      // Generic known plaintext with varying key lengths
      if (!docData) {
        const knownPlain = '{"config":';
        for (let keyLen = 10; keyLen <= 128; keyLen++) {
          try {
            let derivedKey = '';
            for (let i = 0; i < keyLen; i++) {
              derivedKey += String.fromCharCode(ciphertext.charCodeAt(i) ^ knownPlain.charCodeAt(i % knownPlain.length));
            }
            let decResult = '';
            for (let i = 0; i < ciphertext.length; i++) {
              decResult += String.fromCharCode(ciphertext.charCodeAt(i) ^ derivedKey.charCodeAt(i % derivedKey.length));
            }
            if (decResult.startsWith('{"config":')) {
              const parsed = JSON.parse(decResult);
              if (parsed && parsed.quinzenas) {
                docData = parsed;
                method = 'chave recuperada';
                break;
              }
            }
          } catch(e) { continue; }
        }
      }
    } catch(e) {}
  }
  
  return { docData, method };
}

async function searchLostData() {
  const results = document.getElementById('recoveryResults');
  results.innerHTML = '<p style="color:var(--text2);font-size:13px">Buscando e tentando recuperar dados...</p>';
  _recoveredCache = {};
  
  try {
    const snapshot = await db.collection('caminhoes').get();
    
    if (snapshot.empty) {
      results.innerHTML = '<p style="color:var(--text2);font-size:13px">Nenhum dado encontrado na nuvem.</p>';
      return;
    }
    
    let html = '';
    let found = 0;
    
    for (const doc of snapshot.docs) {
      let source = doc.id === DEVICE_ID ? ' (codigo atual)' : ' (codigo antigo)';
      const { docData, method } = tryDecrypt(doc);
      
      if (docData && docData.quinzenas) {
        // Cache the decrypted data so recoverData doesn't need to decrypt again
        _recoveredCache[doc.id] = docData;
        
        found++;
        const totalQ = docData.quinzenas.length;
        const totalRecords = docData.quinzenas.reduce((s, q) => s + (q.records ? q.records.length : 0), 0);
        const totalFuel = docData.quinzenas.reduce((s, q) => s + (q.abastecimentos ? q.abastecimentos.length : 0), 0);
        const qNames = docData.quinzenas.map(q => q.label).join(', ');
        
        if (totalRecords === 0 && totalFuel === 0) continue; // Skip empty ones
        
        html += `
          <div style="background:var(--surface2);border-radius:10px;padding:12px;margin-bottom:8px;border:1px solid var(--border)">
            <div style="font-size:13px;font-weight:600;color:var(--text)">Dados encontrados${source}</div>
            <div style="font-size:11px;color:var(--green)">${method}</div>
            <div style="font-size:12px;color:var(--text2);margin-top:4px">
              ${totalQ} quinzena(s): ${qNames}<br>
              ${totalRecords} viagem(ns), ${totalFuel} abastecimento(s)
            </div>
            <button class="btn btn-primary btn-small" style="margin-top:8px" onclick="recoverData('${doc.id}')">Recuperar estes dados</button>
          </div>`;
      }
    }
    
    if (found === 0 || html === '') {
      results.innerHTML = '<p style="color:var(--text2);font-size:13px">Nenhum dado com registros encontrado na nuvem.</p>';
    } else {
      // Add "recover all" button
      html = `<button class="btn btn-primary" style="margin-bottom:12px" onclick="recoverAll()">Recuperar TODOS os dados</button>` + html;
      results.innerHTML = `<p style="color:var(--green);font-size:13px;margin-bottom:8px">${found} conjunto(s) de dados encontrados!</p>` + html;
    }
  } catch(e) {
    results.innerHTML = '<p style="color:var(--red);font-size:13px">Erro ao buscar: ' + e.message + '</p>';
  }
}

function mergeDocData(docData) {
  let added = 0;
  for (const cloudQ of docData.quinzenas) {
    const localQ = data.quinzenas.find(lq => lq.label === cloudQ.label);
    if (!localQ) {
      // Quinzena doesn't exist locally — add it if it has records
      const hasData = (cloudQ.records && cloudQ.records.length > 0) || (cloudQ.abastecimentos && cloudQ.abastecimentos.length > 0);
      if (hasData) {
        data.quinzenas.push(cloudQ);
        added++;
      }
    } else {
      // Quinzena exists — merge individual records
      if (cloudQ.records) {
        for (const cloudRec of cloudQ.records) {
          const duplicate = localQ.records && localQ.records.some(lr => 
            lr.date === cloudRec.date && lr.kmInicial === cloudRec.kmInicial
          );
          if (!duplicate) {
            if (!localQ.records) localQ.records = [];
            localQ.records.push(cloudRec);
            added++;
          }
        }
      }
      
      if (cloudQ.abastecimentos) {
        for (const cloudAbast of cloudQ.abastecimentos) {
          const duplicate = localQ.abastecimentos && localQ.abastecimentos.some(la => 
            la.date === cloudAbast.date && la.valorTotal === cloudAbast.valorTotal
          );
          if (!duplicate) {
            if (!localQ.abastecimentos) localQ.abastecimentos = [];
            localQ.abastecimentos.push(cloudAbast);
            added++;
          }
        }
      }
    }
  }
  
  // Recover config if current is default
  if (data.config.placa === 'ABC1D23' && docData.config && docData.config.placa !== 'ABC1D23') {
    data.config = docData.config;
  }
  
  return added;
}

async function recoverData(docId) {
  // Use cached data — no need to decrypt again
  let docData = _recoveredCache[docId];
  
  if (!docData) {
    // Fallback: try to decrypt again
    try {
      const doc = await db.collection('caminhoes').doc(docId).get();
      const result = tryDecrypt(doc);
      docData = result.docData;
    } catch(e) {}
  }
  
  if (!docData || !docData.quinzenas) {
    toast('Erro ao recuperar dados');
    return;
  }
  
  const added = mergeDocData(docData);
  save();
  updateQuinzenaSelect();
  render();
  toast(added > 0 ? `${added} registro(s) recuperado(s)!` : 'Dados ja estavam atualizados');
}

async function recoverAll() {
  let totalAdded = 0;
  for (const docId in _recoveredCache) {
    const docData = _recoveredCache[docId];
    if (docData && docData.quinzenas) {
      totalAdded += mergeDocData(docData);
    }
  }
  save();
  updateQuinzenaSelect();
  render();
  toast(totalAdded > 0 ? `${totalAdded} registro(s) recuperado(s)!` : 'Dados ja estavam atualizados');
}
